name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: TestOddEven
      id: testoddeven
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: TestOddEven
        setup-command: ''
        command: node oddEven.js
        input: '3'
        expected-output: Odd
        comparison-method: contains
        timeout: 10
        max-score: 10
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        TESTODDEVEN_RESULTS: "${{steps.testoddeven.outputs.result}}"
      with:
        runners: testoddeven
